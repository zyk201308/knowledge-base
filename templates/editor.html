<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 个人知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            color: #1e1e1e;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: #1e1e1e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #2d2d2d;
        }

        .btn-outline {
            background: white;
            color: #1e1e1e;
            border: 1px solid #e5e5e5;
        }

        .btn-outline:hover {
            background: #f5f5f5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #1e1e1e;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .form-input:focus {
            border-color: #1e1e1e;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 500px;
            margin-bottom: 20px;
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 14px;
            background: #f9fafb;
            border: 1px solid #e5e5e5;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }

        .editor-textarea {
            flex: 1;
            padding: 14px;
            border: 1px solid #e5e5e5;
            border-radius: 0 0 6px 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .editor-textarea:focus {
            border-color: #1e1e1e;
        }

        .preview-panel {
            border: 1px solid #e5e5e5;
            border-radius: 0 0 6px 6px;
            padding: 14px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .markdown-content {
            line-height: 1.8;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            margin-top: 24px;
            margin-bottom: 12px;
        }

        .markdown-content h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .markdown-content h2 {
            font-size: 24px;
            font-weight: 500;
        }

        .markdown-content h3 {
            font-size: 20px;
            font-weight: 500;
        }

        .markdown-content p {
            margin-bottom: 16px;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        .markdown-content pre {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #1e1e1e;
            padding-left: 16px;
            margin: 16px 0;
            color: #6b7280;
        }

        .markdown-content ul, .markdown-content ol {
            margin-left: 24px;
            margin-bottom: 16px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content a {
            color: #2563eb;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 6px 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #1e1e1e;
        }

        .toolbar-btn:hover {
            background: #e5e5e5;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .editor-textarea {
                min-height: 300px;
            }

            .preview-panel {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>编辑文章</h1>
            <div class="header-actions">
                <a href="/" class="btn btn-outline">返回</a>
                <button class="btn" onclick="saveArticle()">保存</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="form-input" id="titleInput" placeholder="输入文章标题...">
        </div>

        <div class="form-group">
            <label class="form-label">分类</label>
            <input type="text" class="form-input" id="categoryInput" placeholder="输入分类（可选）...">
        </div>

        <div class="form-group">
            <label class="form-label">标签（用逗号分隔）</label>
            <input type="text" class="form-input" id="tagsInput" placeholder="输入标签，如：Python, 学习, 笔记">
        </div>

        <div class="form-group">
            <label class="form-label">内容（Markdown格式）</label>
            <div class="toolbar">
                <button class="toolbar-btn" onclick="insertText('**', '**')">加粗</button>
                <button class="toolbar-btn" onclick="insertText('*', '*')">斜体</button>
                <button class="toolbar-btn" onclick="insertText('`', '`')">代码</button>
                <button class="toolbar-btn" onclick="insertText('```\n', '\n```')">代码块</button>
                <button class="toolbar-btn" onclick="insertText('# ', '')">标题</button>
                <button class="toolbar-btn" onclick="insertText('- ', '')">列表</button>
                <button class="toolbar-btn" onclick="insertText('> ', '')">引用</button>
                <button class="toolbar-btn" onclick="insertText('[', '](url)')">链接</button>
            </div>
            <div class="editor-container">
                <div class="editor-panel">
                    <div class="panel-header">编辑</div>
                    <textarea class="editor-textarea" id="contentInput" placeholder="开始写作..."></textarea>
                </div>
                <div class="editor-panel">
                    <div class="panel-header">预览</div>
                    <div class="preview-panel">
                        <div class="markdown-content" id="previewContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/editor.js"></script>
</body>
</html>
