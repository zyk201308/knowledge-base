<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            color: #1e1e1e;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1e1e1e;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: #1e1e1e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #2d2d2d;
        }

        .btn-outline {
            background: white;
            color: #1e1e1e;
            border: 1px solid #e5e5e5;
            margin-right: 8px;
        }

        .btn-outline:hover {
            background: #f5f5f5;
        }

        .search-bar {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: #1e1e1e;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid #e5e5e5;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .filter-btn.active {
            background: #1e1e1e;
            color: white;
            border-color: #1e1e1e;
        }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .article-card {
            background: #f9fafb;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .article-card:hover {
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .article-card h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1e1e1e;
        }

        .article-meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #6b7280;
        }

        .article-card:hover h3 {
            color: #2563eb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 500;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6b7280;
        }

        .modal-body {
            padding: 20px;
        }

        .markdown-content {
            line-height: 1.8;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            margin-top: 24px;
            margin-bottom: 12px;
        }

        .markdown-content h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .markdown-content h2 {
            font-size: 24px;
            font-weight: 500;
        }

        .markdown-content h3 {
            font-size: 20px;
            font-weight: 500;
        }

        .markdown-content p {
            margin-bottom: 16px;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        .markdown-content pre {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #1e1e1e;
            padding-left: 16px;
            margin: 16px 0;
            color: #6b7280;
        }

        .markdown-content ul, .markdown-content ol {
            margin-left: 24px;
            margin-bottom: 16px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content a {
            color: #2563eb;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .modal-actions {
            padding: 20px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 个人知识库</h1>
            <div class="header-actions">
                <a href="/editor" class="btn">新建文章</a>
                <button class="btn btn-outline" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索文章...">
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="uncategorized">未分类</button>
        </div>

        <div class="article-grid" id="articleGrid">
            <div class="empty-state">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <div class="modal" id="articleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">文章标题</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="markdown-content" id="modalContent"></div>
            </div>
            <div class="modal-actions">
                <a href="#" class="btn btn-outline" id="editBtn">编辑</a>
                <button class="btn btn-outline" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
